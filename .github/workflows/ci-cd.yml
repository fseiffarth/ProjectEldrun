name: ci-cd

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libappindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  package-windows:
    name: package-windows
    runs-on: windows-latest
    if: github.event_name == 'push'
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Run backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build release bundles
        run: npm run tauri:build -- --bundles nsis

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: eldrun-${{ github.sha }}-windows-nsis
          # Tauri 2 on Windows puts bundles in the project-root target/ when
          # CARGO_TARGET_DIR is overridden by swatinem/rust-cache.
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.exe

  package:
    name: package
    runs-on: ubuntu-22.04
    if: github.event_name == 'push'
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libappindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release bundles
        run: npm run tauri:bundle

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: eldrun-${{ github.sha }}-appimage
          # Project-root target/ is a fallback for when CARGO_TARGET_DIR is
          # overridden by swatinem/rust-cache.
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.AppImage

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: eldrun-${{ github.sha }}-deb
          # Project-root target/ is a fallback for when CARGO_TARGET_DIR is
          # overridden by swatinem/rust-cache.
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            target/release/bundle/deb/*.deb

  release:
    name: release
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package, package-windows]
    permissions:
      contents: write

    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: eldrun-${{ github.sha }}-appimage
          path: release-assets

      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: eldrun-${{ github.sha }}-deb
          path: release-assets

      - name: Download Windows NSIS artifact
        uses: actions/download-artifact@v4
        with:
          name: eldrun-${{ github.sha }}-windows-nsis
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # Pre-1.0 tags are alpha/preview builds; mark them so on GitHub.
          prerelease: true
          body: |
            Eldrun ${{ github.ref_name }} — alpha / preview build.

            Built from commit ${{ github.sha }}.

            Artifacts:
            - Linux: `.AppImage` (portable) and `.deb`
            - Windows: NSIS `.exe` installer

            This is an early alpha; expect rough edges.
          # Recursive globs: the upload steps list two path patterns, so
          # upload-artifact roots each artifact at the workspace dir and the
          # bundle ends up nested (e.g. target/release/bundle/appimage/*.AppImage)
          # rather than at the artifact root.
          files: |
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.exe
