<svg xmlns="http://www.w3.org/2000/svg" width="940" height="800" viewBox="0 0 940 800" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <rect x="0" y="0" width="940" height="800" rx="14" fill="#faf9fe"/>
  <text x="24" y="38" font-size="22" font-weight="700" fill="#2c2348">Light Lavender — terminal palette</text>
  <text x="24" y="58" font-size="13" fill="#6a6296">Column: swatch · slot · hex · function (Claude Code ANSI usage)</text>

  <!-- ===== CORE ===== -->
  <text x="24" y="88" font-size="15" font-weight="700" fill="#7c5cdb">Core (non-ANSI)</text>

  <g transform="translate(0,100)"><rect x="24" width="150" height="26" rx="5" fill="#faf9fe" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">background</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#faf9fe</text><text x="470" y="18" font-size="13" fill="#4a4470">Pane background / canvas</text></g>
  <g transform="translate(0,130)"><rect x="24" width="150" height="26" rx="5" fill="#2c2348" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">foreground</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#2c2348</text><text x="470" y="18" font-size="13" fill="#4a4470">Default text color</text></g>
  <g transform="translate(0,160)"><rect x="24" width="150" height="26" rx="5" fill="#7c5cdb" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">cursor</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#7c5cdb</text><text x="470" y="18" font-size="13" fill="#4a4470">Text cursor block</text></g>
  <g transform="translate(0,190)"><rect x="24" width="150" height="26" rx="5" fill="#faf9fe" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">cursorAccent</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#faf9fe</text><text x="470" y="18" font-size="13" fill="#4a4470">Glyph under the cursor</text></g>
  <g transform="translate(0,220)"><rect x="24" width="150" height="26" rx="5" fill="#dccff2" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">selectionBackground</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#dccff2</text><text x="470" y="18" font-size="13" fill="#4a4470">Mouse-selection highlight</text></g>
  <g transform="translate(0,250)"><rect x="24" width="150" height="26" rx="5" fill="#241d38" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">selectionForeground</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#241d38</text><text x="470" y="18" font-size="13" fill="#4a4470">Text inside a selection</text></g>

  <!-- ===== ANSI ===== -->
  <text x="24" y="300" font-size="15" font-weight="700" fill="#7c5cdb">16 ANSI slots</text>

  <g transform="translate(0,312)"><rect x="24" width="150" height="26" rx="5" fill="#2f2358" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">black (0)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#2f2358</text><text x="470" y="18" font-size="13" fill="#4a4470">Sent-msg block / removed-diff bg</text></g>
  <g transform="translate(0,342)"><rect x="24" width="150" height="26" rx="5" fill="#d1242f" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">red (1)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#d1242f</text><text x="470" y="18" font-size="13" fill="#4a4470">Errors; − removed text</text></g>
  <g transform="translate(0,372)"><rect x="24" width="150" height="26" rx="5" fill="#0f5a26" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">green (2)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#0f5a26</text><text x="470" y="18" font-size="13" fill="#4a4470">Success; + added text</text></g>
  <g transform="translate(0,402)"><rect x="24" width="150" height="26" rx="5" fill="#9a6700" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">yellow (3)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#9a6700</text><text x="470" y="18" font-size="13" fill="#4a4470">Warnings, modified markers</text></g>
  <g transform="translate(0,432)"><rect x="24" width="150" height="26" rx="5" fill="#0969da" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">blue (4)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#0969da</text><text x="470" y="18" font-size="13" fill="#4a4470">Links, info accents</text></g>
  <g transform="translate(0,462)"><rect x="24" width="150" height="26" rx="5" fill="#7c5cdb" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">magenta (5)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#7c5cdb</text><text x="470" y="18" font-size="13" fill="#4a4470">Accent — pointers / highlights</text></g>
  <g transform="translate(0,492)"><rect x="24" width="150" height="26" rx="5" fill="#1b7c83" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">cyan (6)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#1b7c83</text><text x="470" y="18" font-size="13" fill="#4a4470">Secondary info, paths</text></g>
  <g transform="translate(0,522)"><rect x="24" width="150" height="26" rx="5" fill="#cbc0ec" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">white (7)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#cbc0ec</text><text x="470" y="18" font-size="13" fill="#4a4470">Box borders / dim chrome</text></g>
  <g transform="translate(0,552)"><rect x="24" width="150" height="26" rx="5" fill="#8878c4" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">brightBlack (8)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#8878c4</text><text x="470" y="18" font-size="13" fill="#4a4470">Dim prev msgs / added-diff bg / hints</text></g>
  <g transform="translate(0,582)"><rect x="24" width="150" height="26" rx="5" fill="#cf222e" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">brightRed (9)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#cf222e</text><text x="470" y="18" font-size="13" fill="#4a4470">Bold errors</text></g>
  <g transform="translate(0,612)"><rect x="24" width="150" height="26" rx="5" fill="#1c7a39" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">brightGreen (10)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#1c7a39</text><text x="470" y="18" font-size="13" fill="#4a4470">Bold success / bright added</text></g>
  <g transform="translate(0,642)"><rect x="24" width="150" height="26" rx="5" fill="#bf8700" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">brightYellow (11)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#bf8700</text><text x="470" y="18" font-size="13" fill="#4a4470">Bold warnings</text></g>
  <g transform="translate(0,672)"><rect x="24" width="150" height="26" rx="5" fill="#0550ae" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">brightBlue (12)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#0550ae</text><text x="470" y="18" font-size="13" fill="#4a4470">Bold links / info</text></g>
  <g transform="translate(0,702)"><rect x="24" width="150" height="26" rx="5" fill="#b48cf0" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">brightMagenta (13)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#b48cf0</text><text x="470" y="18" font-size="13" fill="#4a4470">Bright accent</text></g>
  <g transform="translate(0,732)"><rect x="24" width="150" height="26" rx="5" fill="#3192aa" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">brightCyan (14)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#3192aa</text><text x="470" y="18" font-size="13" fill="#4a4470">Bright secondary</text></g>
  <g transform="translate(0,762)"><rect x="24" width="150" height="26" rx="5" fill="#2c2348" stroke="#d8d2e6"/><text x="190" y="18" font-size="13" fill="#2c2348">brightWhite (15)</text><text x="360" y="18" font-size="13" font-family="monospace" fill="#2c2348">#2c2348</text><text x="470" y="18" font-size="13" fill="#4a4470">Brightest text = darkest here</text></g>
</svg>
