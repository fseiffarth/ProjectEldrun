[package]
name = "eldrun"
version = "0.1.0"
edition = "2021"

[lib]
name = "eldrun_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "eldrun"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
portable-pty = "0.9.0"
tokio = { version = "1.52.3", features = ["full"] }
mime_guess = "2.0.5"
infer = "0.19.0"
opener = "0.8.4"

# Linux-only: workspace backends
[target.'cfg(target_os = "linux")'.dependencies]
zbus = "4"
xcb = { version = "1", features = ["randr"] }

[dev-dependencies]
tempfile = "3"
