[package]
name = "eldrun"
version = "0.1.0"
edition = "2021"
# Phase 2 will add tauri and the full app setup.
# Phase 1 is schema + storage only — compiles without system webkit/gtk deps.

[lib]
name = "eldrun"
path = "src/lib.rs"

[[bin]]
name = "eldrun"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
