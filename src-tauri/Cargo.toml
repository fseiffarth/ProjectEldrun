[package]
name = "eldrun"
version = "0.1.0"
edition = "2021"

[lib]
name = "eldrun_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "eldrun"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
